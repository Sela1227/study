<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F4F2ED">
<title>阿蔓明道國中復習專班</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="page">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-label">明道國中 · 復習專班</div>
    <h1>阿蔓的複習基地</h1>
    <p class="hero-sub">數學 &thinsp;·&thinsp; 物理 &thinsp;·&thinsp; 化學</p>
  </div>

  <!-- Subjects -->
  <div class="section-head">
    <span class="section-head-label">科目</span>
    <div class="section-head-line"></div>
  </div>

  <div class="subject-list">

    <a href="math/" class="subject-card">
      <div class="subject-dot" style="background:var(--math);"></div>
      <div class="subject-body">
        <div class="subject-name" style="color:var(--math);">數學</div>
        <div class="subject-desc">代數 · 幾何 · 統計 · 函數</div>
        <div class="subject-status" style="color:var(--text-3);">尚未開始</div>
      </div>
      <div class="subject-arrow">›</div>
    </a>

    <a href="physics/" class="subject-card">
      <div class="subject-dot" style="background:var(--phys);"></div>
      <div class="subject-body">
        <div class="subject-name" style="color:var(--phys);">物理</div>
        <div class="subject-desc">力學 · 光學 · 電學 · 熱學</div>
        <div class="subject-status" style="color:var(--text-3);">尚未開始</div>
      </div>
      <div class="subject-arrow">›</div>
    </a>

    <a href="chemistry/" class="subject-card">
      <div class="subject-dot" style="background:var(--chem);"></div>
      <div class="subject-body">
        <div class="subject-name" style="color:var(--chem);">化學</div>
        <div class="subject-desc">元素 · 化合物 · 化學反應 · 酸鹼</div>
        <div class="subject-status">
          <span class="status s-done">
            <span class="status-dot"></span>
            第五章教材 · 第一次段考解析
          </span>
        </div>
      </div>
      <div class="subject-arrow">›</div>
    </a>

  </div>

  <!-- Footer -->
  <div class="page-footer">
    <span class="footer-left">阿蔓明道國中復習專班</span>
    <span class="footer-right">V1.3</span>
  </div>

</div>
</body>
</html>
